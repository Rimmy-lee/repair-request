<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>의료기기 수리접수</title>

<script>
/* ═══════════════════════════════════════════════════════════
   ★ 여기 딱 한 줄만 수정하면 됩니다 ★
   설치가이드 4단계에서 복사한 "웹 앱 URL"을
   아래 따옴표 안에 붙여넣어 주세요.
   예) var API_URL = "https://script.google.com/macros/s/AKfy.../exec";
═══════════════════════════════════════════════════════════ */
var API_URL = "https://script.google.com/macros/s/AKfycbzHpUnj_bU6GjPkcfGL5oNx11ASk7wXHcd4Rc4CtohDqBmlkt5rNZRP6o6e8FhjD0bE4w/exec";
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --navy:#33506E; --steel:#5B7C99; --bg:#F4F6F9; --card:#FFFFFF;
    --border:#E2E7EE; --ink:#2E3440; --sub:#7A8494;
    --wait:#B25454; --part:#B08A32; --doing:#4A6E92; --done:#78876B;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{font-family:'Pretendard',-apple-system,'Malgun Gothic',sans-serif;background:var(--bg);color:var(--ink);padding-bottom:90px}

  /* 상단 헤더 */
  header{background:var(--navy);color:#fff;padding:16px 18px 14px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
  header h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
  header h1 small{display:block;font-size:11px;font-weight:400;opacity:.75;margin-top:2px;letter-spacing:.2px}
  .gear{background:rgba(255,255,255,.14);border:none;color:#fff;width:38px;height:38px;border-radius:10px;font-size:17px;cursor:pointer}

  /* 하단 탭 */
  nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;padding:12px 0 10px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
  nav button .ic{display:block;font-size:20px;margin-bottom:3px}
  nav button.on{color:var(--navy)}
  nav button.on .ic{transform:scale(1.08)}

  main{max-width:560px;margin:0 auto;padding:16px 14px}
  .page{display:none}
  .page.on{display:block}

  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
  label{display:block;font-size:13px;font-weight:700;margin-bottom:7px;color:var(--ink)}
  label .opt{font-weight:400;color:var(--sub);font-size:12px}
  input[type=text],textarea,select{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink)}
  input:focus,textarea:focus,select:focus{outline:none;border-color:var(--steel)}
  textarea{min-height:96px;resize:vertical}
  .row{display:flex;gap:8px}

  /* 바코드 스캔 버튼 (대표 요소) */
  .scanBtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;font-family:inherit}
  .scanBtn .bars{display:inline-flex;gap:2px;align-items:flex-end;height:18px}
  .scanBtn .bars i{display:inline-block;width:2px;background:#fff;border-radius:1px}
  .scanBtn .bars i:nth-child(1){height:18px}.scanBtn .bars i:nth-child(2){height:12px;width:3px}
  .scanBtn .bars i:nth-child(3){height:18px}.scanBtn .bars i:nth-child(4){height:14px}
  .scanBtn .bars i:nth-child(5){height:18px;width:3px}.scanBtn .bars i:nth-child(6){height:11px}
  .scanBtn .bars i:nth-child(7){height:18px}

  #scanBox{display:none;margin-top:10px;border-radius:12px;overflow:hidden;border:1.5px solid var(--border)}
  #reader{width:100%}
  .scanClose{width:100%;background:#EDF1F6;border:none;padding:11px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit}

  .deviceChip{display:none;margin-top:10px;background:#EEF3F8;border:1px solid #D5E0EA;border-radius:10px;padding:10px 12px;font-size:14px}
  .deviceChip b{color:var(--navy)}
  .deviceChip span{color:var(--sub);font-size:12.5px;display:block;margin-top:2px}

  /* 사진 */
  .photoBtns{display:flex;gap:8px}
  .photoBtns button{flex:1;background:#fff;border:1.5px solid var(--border);border-radius:10px;padding:12px;font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit}
  #photoPreview{display:none;margin-top:10px;position:relative}
  #photoPreview img{width:100%;border-radius:10px;display:block}
  #photoPreview button{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;cursor:pointer}

  .submitBtn{width:100%;background:var(--navy);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
  .submitBtn:disabled{opacity:.5}

  /* 현황 필터 */
  .filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px}
  .filters button{flex:0 0 auto;background:#fff;border:1.5px solid var(--border);border-radius:20px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;font-family:inherit;white-space:nowrap}
  .filters button.on{background:var(--navy);border-color:var(--navy);color:#fff}

  .item{background:#fff;border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid var(--border)}
  .item.s대기{border-left-color:var(--wait)} .item.s부품{border-left-color:var(--part)}
  .item.s수리{border-left-color:var(--doing)} .item.s완료{border-left-color:var(--done)}
  .itemTop{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .itemTop b{font-size:15.5px;letter-spacing:-.2px}
  .badge{flex:0 0 auto;font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:12px;color:#fff}
  .b대기{background:var(--wait)} .b부품{background:var(--part)} .b수리{background:var(--doing)} .b완료{background:var(--done)}
  .meta{font-size:12px;color:var(--sub);margin-top:4px}
  .symptom{font-size:14px;margin-top:8px;line-height:1.5;white-space:pre-wrap}
  .item img{width:100%;max-height:220px;object-fit:cover;border-radius:10px;margin-top:10px;cursor:pointer}
  .statusSel{margin-top:10px}
  .statusSel select{padding:10px 12px;font-size:14px}

  .refreshBtn{width:100%;background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:14px;font-weight:600;color:var(--navy);cursor:pointer;margin-bottom:12px;font-family:inherit}
  .empty{text-align:center;color:var(--sub);font-size:14px;padding:44px 0}

  /* 모달 */
  .modalBg{display:none;position:fixed;inset:0;background:rgba(20,30,44,.45);z-index:100;align-items:flex-end;justify-content:center}
  .modalBg.on{display:flex}
  .modal{background:#fff;width:100%;max-width:560px;border-radius:18px 18px 0 0;padding:22px 18px calc(22px + env(safe-area-inset-bottom))}
  .modal h2{font-size:16px;margin-bottom:16px}
  .togRow{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid var(--border)}
  .togRow div b{font-size:14.5px;display:block}
  .togRow div span{font-size:12px;color:var(--sub)}
  .tog{position:relative;width:50px;height:29px;flex:0 0 auto}
  .tog input{opacity:0;width:0;height:0}
  .tog i{position:absolute;inset:0;background:#CBD4DE;border-radius:20px;transition:.2s;cursor:pointer}
  .tog i:before{content:"";position:absolute;width:23px;height:23px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.25)}
  .tog input:checked + i{background:var(--done)}
  .tog input:checked + i:before{transform:translateX(21px)}
  .modalClose{width:100%;background:#EDF1F6;border:none;border-radius:11px;padding:13px;font-size:14.5px;font-weight:600;margin-top:14px;cursor:pointer;font-family:inherit}

  /* 토스트 */
  #toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(30,40,55,.92);color:#fff;padding:11px 20px;border-radius:22px;font-size:14px;z-index:200;display:none;white-space:nowrap}

  /* 최초 설정 안내 */
  #setupOverlay{display:none;position:fixed;inset:0;background:var(--bg);z-index:150;padding:36px 22px;overflow-y:auto}
  #setupOverlay h2{font-size:19px;color:var(--navy);margin-bottom:12px}
  #setupOverlay p{font-size:14.5px;line-height:1.7;color:var(--ink);margin-bottom:14px}
  #setupOverlay input{margin-bottom:10px}
  #setupOverlay button{width:100%;background:var(--navy);color:#fff;border:none;border-radius:11px;padding:14px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}

  #photoModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:300;align-items:center;justify-content:center;padding:16px}
  #photoModal.on{display:flex}
  #photoModal img{max-width:100%;max-height:92vh;border-radius:8px}

  .spin{display:inline-block;width:15px;height:15px;border:2.5px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:7px}
  @keyframes sp{to{transform:rotate(360deg)}}
  @media (prefers-reduced-motion: reduce){.spin{animation-duration:1.5s}}
</style>
</head>
<body>

<header>
  <h1>의료기기 수리접수<small>간호동 · 의공실 진행관리</small></h1>
  <button class="gear" onclick="openSettings()" aria-label="설정">⚙</button>
</header>

<main>
  <!-- ───────── 접수하기 ───────── -->
  <section class="page on" id="pageForm">
    <div class="card">
      <label>① 장비 바코드</label>
      <button class="scanBtn" onclick="toggleScan()">
        <span class="bars"><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>
        카메라로 바코드 스캔
      </button>
      <div id="scanBox">
        <div id="reader"></div>
        <div style="background:#EEF3F8;padding:9px 12px;font-size:12.5px;color:#5B7C99;line-height:1.5">💡 바코드를 <b>10~15cm 거리</b>에서 화면 가로에 꽉 차게 비추고, 초점이 맞을 때까지 1~2초 기다려주세요.</div>
        <button class="scanClose" onclick="stopScan()">스캔 닫기</button>
      </div>
      <div style="margin-top:10px">
        <input type="text" id="barcode" placeholder="또는 바코드 번호 직접 입력 (예: BC10001)" oninput="matchDevice()">
      </div>
      <div class="deviceChip" id="deviceChip"></div>
      <div id="manualDevice" style="display:none;margin-top:10px">
        <label>기기명 직접 입력</label>
        <input type="text" id="deviceInput" placeholder="예: 인퓨전 펌프">
      </div>
    </div>

    <div class="card">
      <label>② 고장 증상</label>
      <textarea id="symptom" placeholder="증상을 자세히 적어주세요.&#10;예) 전원은 켜지는데 화면에 E-04 에러가 계속 표시됨"></textarea>
    </div>

    <div class="card">
      <label>③ 사진 <span class="opt">(선택)</span></label>
      <div class="photoBtns">
        <button onclick="document.getElementById('camInput').click()">📷 촬영하기</button>
        <button onclick="document.getElementById('albumInput').click()">🖼 앨범에서 선택</button>
      </div>
      <input type="file" id="camInput" accept="image/*" capture="environment" hidden onchange="pickPhoto(this)">
      <input type="file" id="albumInput" accept="image/*" hidden onchange="pickPhoto(this)">
      <div id="photoPreview"><img id="previewImg" alt="첨부 사진"><button onclick="clearPhoto()">✕ 삭제</button></div>
    </div>

    <div class="card">
      <label>④ 요청자</label>
      <input type="text" id="requester" placeholder="이름 또는 병동/부서 (예: 71병동 김OO)">
    </div>

    <button class="submitBtn" id="submitBtn" onclick="submitRepair()">수리 접수하기</button>
  </section>

  <!-- ───────── 수리현황 ───────── -->
  <section class="page" id="pageList">
    <button class="refreshBtn" onclick="loadData(true)">↻ 새로고침</button>
    <div class="filters" id="filters"></div>
    <div id="list"></div>
  </section>
</main>

<nav>
  <button class="on" id="tabForm" onclick="showPage('Form')"><span class="ic">📝</span>접수하기</button>
  <button id="tabList" onclick="showPage('List')"><span class="ic">🔧</span>수리현황</button>
</nav>

<!-- 설정 모달 -->
<div class="modalBg" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2>설정</h2>
    <div class="togRow">
      <div><b>새 접수 이메일 알림</b><span>새 수리요청이 오면 의공실 이메일로 알림</span></div>
      <label class="tog"><input type="checkbox" id="alarmTog" onchange="toggleAlarm(this.checked)"><i></i></label>
    </div>
    <button class="modalClose" onclick="closeSettings()">닫기</button>
  </div>
</div>

<!-- 사진 크게 보기 -->
<div id="photoModal" onclick="this.classList.remove('on')"><img id="photoModalImg" alt="사진 크게 보기"></div>

<!-- 최초 연결 안내 -->
<div id="setupOverlay">
  <h2>구글 시트와 연결해 주세요</h2>
  <p>설치가이드 <b>4단계</b>에서 복사한 <b>웹 앱 URL</b>(https://script.google.com/... 으로 시작)을 아래에 붙여넣고 연결 버튼을 눌러주세요.<br><br>
  ※ index.html 파일 위쪽 <b>API_URL</b> 칸에 직접 붙여넣어 두면 모든 사용자에게 자동 적용됩니다.</p>
  <input type="text" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec">
  <button onclick="saveSetupUrl()">연결하기</button>
</div>

<div id="toast"></div>

<script>
/* ─────────── 기본 상태 ─────────── */
var STATUSES = ['접수대기','부품대기','수리중','수리완료'];
var SKEY = {'접수대기':'대기','부품대기':'부품','수리중':'수리','수리완료':'완료'};
var equipment = [], repairs = [], filterNow = '전체';
var photoBase64 = null, scanner = null;

function api(){ return API_URL || localStorage.getItem('repair_api_url') || ''; }

/* ─────────── 화면 전환 ─────────── */
function showPage(name){
  document.getElementById('pageForm').classList.toggle('on', name==='Form');
  document.getElementById('pageList').classList.toggle('on', name==='List');
  document.getElementById('tabForm').classList.toggle('on', name==='Form');
  document.getElementById('tabList').classList.toggle('on', name==='List');
  if(name==='List') loadData(false);
}

/* ─────────── 데이터 불러오기 ─────────── */
function loadData(showMsg){
  if(!api()) return;
  if(showMsg) toast('불러오는 중...');
  fetch(api()).then(function(r){return r.json()}).then(function(d){
    if(!d.ok) throw new Error(d.error||'');
    equipment = d.equipment||[];
    repairs = (d.repairs||[]).reverse(); // 최신순
    var alarm = '';
    (d.config||[]).forEach(function(c){ if(c['설정명']==='수리접수알람') alarm = String(c['값']).toUpperCase(); });
    document.getElementById('alarmTog').checked = (alarm==='TRUE');
    renderList();
    if(showMsg) toast('최신 정보로 업데이트했어요');
  }).catch(function(){ toast('불러오기에 실패했어요. 인터넷/URL을 확인해주세요.'); });
}

/* ─────────── 현황 목록 그리기 ─────────── */
function renderList(){
  var f = document.getElementById('filters'), l = document.getElementById('list');
  var counts = {'전체':repairs.length};
  STATUSES.forEach(function(s){ counts[s] = repairs.filter(function(r){return r['진행상태']===s}).length; });
  f.innerHTML = ['전체'].concat(STATUSES).map(function(s){
    return '<button class="'+(filterNow===s?'on':'')+'" onclick="setFilter(\''+s+'\')">'+s+' '+counts[s]+'</button>';
  }).join('');

  var rows = filterNow==='전체' ? repairs : repairs.filter(function(r){return r['진행상태']===filterNow});
  if(rows.length===0){ l.innerHTML = '<div class="empty">표시할 접수 내역이 없어요</div>'; return; }

  l.innerHTML = rows.map(function(r){
    var k = SKEY[r['진행상태']]||'대기';
    var eq = equipment.find(function(e){return e['바코드']===r['바코드']});
    var loc = eq && eq['설치위치'] ? ' · '+eq['설치위치'] : '';
    return '<div class="item s'+k+'">'
      + '<div class="itemTop"><b>'+esc(r['기기명']||'기기명 미상')+'</b><span class="badge b'+k+'">'+r['진행상태']+'</span></div>'
      + '<div class="meta">'+esc(r['접수번호'])+' · '+esc(r['접수시간'])+' · '+esc(r['요청자']||'-')+loc+'</div>'
      + (r['고장증상']?'<div class="symptom">'+esc(r['고장증상'])+'</div>':'')
      + (r['사진']?'<img src="'+esc(r['사진'])+'" loading="lazy" onclick="bigPhoto(this.src)" alt="고장 사진">':'')
      + '<div class="statusSel"><select onchange="changeStatus(\''+esc(r['접수번호'])+'\',this)">'
      + STATUSES.map(function(s){return '<option '+(s===r['진행상태']?'selected':'')+'>'+s+'</option>'}).join('')
      + '</select></div></div>';
  }).join('');
}
function setFilter(s){ filterNow=s; renderList(); }
function bigPhoto(src){ document.getElementById('photoModalImg').src=src; document.getElementById('photoModal').classList.add('on'); }

/* ─────────── 진행상태 변경 ─────────── */
function changeStatus(id, sel){
  var v = sel.value;
  sel.disabled = true;
  post({action:'status', id:id, status:v}).then(function(d){
    sel.disabled = false;
    if(d.ok){
      var r = repairs.find(function(x){return x['접수번호']===id});
      if(r) r['진행상태']=v;
      renderList(); toast('"'+v+'" 상태로 변경했어요');
    } else { toast('변경 실패: '+(d.error||'')); loadData(false); }
  });
}

/* ─────────── 바코드 스캔 ─────────── */
function toggleScan(){
  var box = document.getElementById('scanBox');
  if(box.style.display==='block'){ stopScan(); return; }
  box.style.display='block';
  scanner = new Html5Qrcode('reader', {
    formatsToSupport: [
      Html5QrcodeSupportedFormats.CODE_128,
      Html5QrcodeSupportedFormats.CODE_39,
      Html5QrcodeSupportedFormats.CODE_93,
      Html5QrcodeSupportedFormats.EAN_13,
      Html5QrcodeSupportedFormats.EAN_8,
      Html5QrcodeSupportedFormats.UPC_A,
      Html5QrcodeSupportedFormats.UPC_E,
      Html5QrcodeSupportedFormats.ITF,
      Html5QrcodeSupportedFormats.CODABAR,
      Html5QrcodeSupportedFormats.QR_CODE,
      Html5QrcodeSupportedFormats.DATA_MATRIX
    ],
    experimentalFeatures: { useBarCodeDetectorIfSupported: true },
    verbose: false
  });
  scanner.start(
    {facingMode:'environment'},
    {
      fps: 15,
      qrbox: function(vw, vh){
        return { width: Math.floor(vw*0.9), height: Math.floor(Math.min(vh*0.55, vw*0.5)) };
      },
      videoConstraints: { facingMode:'environment', width:{ideal:1280}, height:{ideal:720} }
    },
    function(text){ document.getElementById('barcode').value=text; matchDevice(); stopScan(); toast('바코드 인식 완료!'); },
    function(){}
  ).catch(function(){ toast('카메라를 열 수 없어요. 권한을 허용해주세요.'); box.style.display='none'; });
}
function stopScan(){
  document.getElementById('scanBox').style.display='none';
  if(scanner){ scanner.stop().then(function(){scanner.clear();scanner=null;}).catch(function(){scanner=null;}); }
}

/* ─────────── 바코드 → 기기명 자동 매칭 ─────────── */
function matchDevice(){
  var code = document.getElementById('barcode').value.trim();
  var chip = document.getElementById('deviceChip');
  var manual = document.getElementById('manualDevice');
  if(!code){ chip.style.display='none'; manual.style.display='none'; return; }
  var eq = equipment.find(function(e){return e['바코드']===code});
  if(eq){
    chip.innerHTML = '✔ <b>'+esc(eq['기기명'])+'</b><span>'+(eq['설치위치']?'설치위치: '+esc(eq['설치위치']):'')+'</span>';
    chip.style.display='block'; manual.style.display='none';
  } else {
    chip.innerHTML = '이 바코드는 장비목록에 없어요. 아래에 기기명을 직접 적어주세요.';
    chip.style.display='block'; manual.style.display='block';
  }
}

/* ─────────── 사진 선택 + 자동 압축 ─────────── */
function pickPhoto(input){
  var file = input.files[0]; input.value='';
  if(!file) return;
  var img = new Image();
  img.onload = function(){
    var max = 1200, w = img.width, h = img.height;
    if(w>max||h>max){ if(w>h){h=h*max/w;w=max;} else {w=w*max/h;h=max;} }
    var cv = document.createElement('canvas'); cv.width=w; cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    var url = cv.toDataURL('image/jpeg',0.72);
    photoBase64 = url.split(',')[1];
    document.getElementById('previewImg').src = url;
    document.getElementById('photoPreview').style.display='block';
  };
  img.src = URL.createObjectURL(file);
}
function clearPhoto(){ photoBase64=null; document.getElementById('photoPreview').style.display='none'; }

/* ─────────── 접수하기 ─────────── */
function submitRepair(){
  var code = document.getElementById('barcode').value.trim();
  var eq = equipment.find(function(e){return e['바코드']===code});
  var device = eq ? eq['기기명'] : document.getElementById('deviceInput').value.trim();
  var symptom = document.getElementById('symptom').value.trim();
  var requester = document.getElementById('requester').value.trim();

  if(!device){ toast('바코드를 스캔하거나 기기명을 입력해주세요'); return; }
  if(!symptom){ toast('고장 증상을 입력해주세요'); return; }
  if(!requester){ toast('요청자를 입력해주세요'); return; }

  var btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>접수 중...';
  localStorage.setItem('repair_requester', requester);

  post({action:'create', barcode:code, device:device, symptom:symptom, requester:requester, photo:photoBase64})
  .then(function(d){
    btn.disabled=false; btn.textContent='수리 접수하기';
    if(d.ok){
      toast('접수 완료! ('+d.id+')');
      document.getElementById('barcode').value=''; document.getElementById('deviceInput').value='';
      document.getElementById('symptom').value=''; clearPhoto(); matchDevice();
      loadData(false); showPage('List');
    } else toast('접수 실패: '+(d.error||'다시 시도해주세요'));
  });
}

/* ─────────── 알림 켜기/끄기 ─────────── */
function toggleAlarm(on){
  post({action:'alarm', on:on}).then(function(d){
    if(d.ok) toast(on?'알림을 켰어요':'알림을 껐어요');
    else { toast('설정 변경 실패'); document.getElementById('alarmTog').checked=!on; }
  });
}
function openSettings(){ document.getElementById('settingsModal').classList.add('on'); }
function closeSettings(){ document.getElementById('settingsModal').classList.remove('on'); }

/* ─────────── 공통 ─────────── */
function post(body){
  return fetch(api(), {method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body:JSON.stringify(body)})
    .then(function(r){return r.json()})
    .catch(function(){ toast('연결에 실패했어요. 인터넷을 확인해주세요.'); return {ok:false}; });
}
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.display='block';
  clearTimeout(t._tm); t._tm = setTimeout(function(){t.style.display='none'}, 2600);
}
function saveSetupUrl(){
  var u = document.getElementById('setupUrl').value.trim();
  if(u.indexOf('https://script.google.com/')!==0){ toast('올바른 웹 앱 URL이 아니에요'); return; }
  localStorage.setItem('repair_api_url', u);
  document.getElementById('setupOverlay').style.display='none';
  loadData(true);
}

/* ─────────── 시작 ─────────── */
(function init(){
  var saved = localStorage.getItem('repair_requester');
  if(saved) document.getElementById('requester').value = saved;
  if(!api()){ document.getElementById('setupOverlay').style.display='block'; return; }
  loadData(false);
})();
</script>
</body>
